name: Update TCB Exchange Rates
on:
  schedule:
    - cron: '30 2,8 * * 1-5'  # 10:30 & 16:30 Taiwan time (UTC+8), weekdays
  workflow_dispatch:  # manual trigger
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch TCB rates from findrate.tw and update history
        run: |
          set -e
          FILE="data/rates-history.json"
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)

          # Fetch 合作金庫 rates from findrate.tw
          curl -sL "https://www.findrate.tw/bank/10/" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" \
            --retry 3 --retry-delay 5 \
            -o /tmp/tcb.html

          if [ ! -s /tmp/tcb.html ]; then
            echo "No response from findrate.tw, skipping"
            exit 0
          fi

          # Parse rates using Python
          python3 << PYEOF
          import json, re, sys

          with open("/tmp/tcb.html", "r", encoding="utf-8") as f:
              html = f.read()

          currency_map = {"美金": "USD", "歐元": "EUR", "日幣": "JPY", "日圓": "JPY"}
          rates = {}

          rows = re.findall(r"<tr[^>]*>([\s\S]*?)</tr>", html, re.IGNORECASE)
          for row in rows:
              cells = re.findall(r"<td[^>]*>([\s\S]*?)</td>", row, re.IGNORECASE)
              if len(cells) < 5:
                  continue
              cell_texts = [re.sub(r"<[^>]*>", "", c).strip() for c in cells]
              cur = None
              for key, code in currency_map.items():
                  if key in cell_texts[0]:
                      cur = code
                      break
              if not cur or cur in rates:
                  continue
              try:
                  spot_buy = float(cell_texts[3])
                  spot_sell = float(cell_texts[4])
                  if spot_buy > 0 and spot_sell > 0:
                      rates[cur] = {"spotBuy": spot_buy, "spotSell": spot_sell}
              except:
                  continue

          if not all(c in rates for c in ["USD", "EUR", "JPY"]):
              print("Incomplete rate data, skipping")
              sys.exit(0)

          for c in ["USD", "EUR", "JPY"]:
              print(f'{c}: {rates[c]["spotBuy"]} / {rates[c]["spotSell"]}')

          date = "$DATE"
          file_path = "$FILE"

          with open(file_path, "r") as f:
              data = json.load(f)

          data[date] = rates

          sorted_keys = sorted(data.keys())
          if len(sorted_keys) > 120:
              for k in sorted_keys[:-120]:
                  del data[k]

          with open(file_path, "w") as f:
              json.dump(dict(sorted(data.items())), f, separators=(",", ":"))

          print(f"Updated: {len(data)} days in history")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rates-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TCB exchange rates $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
